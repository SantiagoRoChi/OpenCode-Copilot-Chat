<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="#0f172a"/>
  
  <!-- Main shape - Rounded square (Copilot style) -->
  <rect x="48" y="48" width="160" height="160" rx="32" fill="url(#grad1)"/>
  
  <!-- OpenCode brackets < > subtly integrated -->
  <g transform="translate(128, 128)">
    <!-- Left bracket -->
    <path d="M-45,-30 L-20,0 L-45,30" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Right bracket -->
    <path d="M45,-30 L20,0 L45,30" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    
    <!-- Connection dot (subtle nod to Copilot's "connection") -->
    <circle cx="0" cy="0" r="8" fill="white"/>
  </g>
  
  <!-- Subtle sparkle/star (AI element) -->
  <g transform="translate(180, 70)" fill="white" opacity="0.8">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z"/>
  </g>
</svg>
